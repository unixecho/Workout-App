<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:-apple-system,"SF Pro Text","SF Pro Display",system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#0A0D12;}
button{font-family:inherit;border:none;background:none;padding:0;margin:0;color:inherit;cursor:pointer;}
@keyframes pulseRing{0%{transform:scale(1);opacity:.55}70%{transform:scale(1.75);opacity:0}100%{opacity:0}}
@keyframes ringDash{from{stroke-dashoffset:175.93}to{stroke-dashoffset:117.29}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</helmet>
<div style="--bg:#0A0D12;--bg-elev:#12161D;--card:#171C24;--card-border:rgba(255,255,255,0.06);--hairline:rgba(255,255,255,0.08);--ink:#F2F4F7;--ink-dim:#9AA3AF;--ink-faint:#5B6472;--blue:#3D8BFD;--green:#30D158;--amber:#FF9F0A;min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px 16px 40px;background:#0A0D12;">

  <div style="display:flex;gap:6px;width:100%;max-width:390px;">
    <button onClick="{{ setNot }}" style="{{ st1 }}">Not started</button>
    <button onClick="{{ setProg }}" style="{{ st2 }}">In progress</button>
    <button onClick="{{ setDone }}" style="{{ st3 }}">Complete</button>
  </div>

  <div style="position:relative;width:390px;height:844px;background:var(--bg);overflow:hidden;">

    <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 40% at 85% -5%,rgba(61,139,253,0.13),transparent 60%),radial-gradient(ellipse 70% 35% at 10% 108%,rgba(48,209,88,0.08),transparent 60%),var(--bg);"></div>

    <div style="position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:none;">

      <div style="position:sticky;top:0;z-index:20;padding:calc(env(safe-area-inset-top) + 10px) 20px 16px;background:linear-gradient(180deg,rgba(10,13,18,0.96) 55%,rgba(10,13,18,0.6) 85%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div style="min-width:0;">
          <div style="font-size:13px;font-weight:600;letter-spacing:0.04em;color:var(--ink-faint);text-transform:uppercase;">Tuesday, Jul 8</div>
          <div style="font-size:34px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);line-height:1.08;margin-top:3px;">Let's go, Alex</div>
        </div>
        <button style="flex:none;display:flex;align-items:center;gap:5px;padding:8px 13px;border-radius:999px;background:rgba(61,139,253,0.14);transition:transform .15s ease,background .15s ease;" style-active="transform:scale(0.94);background:rgba(61,139,253,0.24);">
          <span style="font-size:15px;line-height:1;">🔥</span>
          <span style="font-size:16px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums;">12</span>
        </button>
      </div>

      <div style="padding:4px 18px 108px;display:flex;flex-direction:column;gap:20px;">

        <sc-if value="{{ isNot }}" hint-placeholder-val="{{ true }}">
          <div style="background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:18px;position:relative;overflow:hidden;">
            <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 90% 60% at 100% 0%,rgba(61,139,253,0.10),transparent 55%);"></div>
            <div style="position:relative;">
              <div style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--blue);">Today's Workout</div>
              <div style="font-size:22px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);margin-top:5px;">Push Day — Chest &amp; Triceps</div>
              <div style="display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;">
                <span style="padding:5px 11px;border-radius:999px;background:rgba(255,255,255,0.06);font-size:12.5px;font-weight:600;color:var(--ink-dim);">Chest</span>
                <span style="padding:5px 11px;border-radius:999px;background:rgba(255,255,255,0.06);font-size:12.5px;font-weight:600;color:var(--ink-dim);">Triceps</span>
                <span style="padding:5px 11px;border-radius:999px;background:rgba(255,255,255,0.06);font-size:12.5px;font-weight:600;color:var(--ink-dim);">Shoulders</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13.5px;font-weight:500;color:var(--ink-dim);">
                <span>45 min</span><span style="color:var(--ink-faint);">·</span><span>6 exercises</span>
              </div>
              <button style="width:100%;margin-top:16px;padding:15px;border-radius:12px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;letter-spacing:-0.01em;transition:transform .16s cubic-bezier(.4,0,.2,1),filter .16s ease;" style-active="transform:scale(0.98);filter:brightness(1.14);">Start</button>
            </div>
          </div>
        </sc-if>

        <sc-if value="{{ isProg }}">
          <div style="background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:18px;position:relative;overflow:hidden;">
            <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 90% 60% at 100% 0%,rgba(48,209,88,0.09),transparent 55%);"></div>
            <div style="position:relative;display:flex;align-items:center;gap:16px;">
              <div style="position:relative;flex:none;width:72px;height:72px;">
                <svg width="72" height="72" viewBox="0 0 72 72">
                  <circle cx="36" cy="36" r="28" fill="none" stroke="var(--hairline)" stroke-width="6"/>
                  <circle cx="36" cy="36" r="28" fill="none" stroke="var(--green)" stroke-width="6" stroke-linecap="round" stroke-dasharray="175.93" transform="rotate(-90 36 36)" style="animation:{{ ringAnim }};"/>
                </svg>
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;">2/6</div>
              </div>
              <div style="min-width:0;">
                <div style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--green);">In progress</div>
                <div style="font-size:19px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);margin-top:3px;">Push Day — Chest &amp; Triceps</div>
                <div style="font-size:13.5px;font-weight:500;color:var(--ink-dim);margin-top:5px;">4 exercises left · 21 min</div>
              </div>
            </div>
            <button style="width:100%;margin-top:16px;padding:15px;border-radius:12px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;letter-spacing:-0.01em;transition:transform .16s cubic-bezier(.4,0,.2,1),filter .16s ease;" style-active="transform:scale(0.98);filter:brightness(1.14);">Resume</button>
          </div>
        </sc-if>

        <sc-if value="{{ isDone }}">
          <div style="background:rgba(48,209,88,0.09);border:1px solid rgba(48,209,88,0.22);border-radius:16px;padding:18px;position:relative;overflow:hidden;">
            <div style="display:flex;align-items:center;gap:13px;">
              <div style="flex:none;width:44px;height:44px;border-radius:999px;background:rgba(48,209,88,0.18);display:flex;align-items:center;justify-content:center;">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M5 12.5l4.2 4.2L19 7" stroke="var(--green)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              </div>
              <div style="min-width:0;">
                <div style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--green);">Complete</div>
                <div style="font-size:19px;font-weight:800;letter-spacing:-0.02em;color:var(--ink);margin-top:2px;">Push Day — Chest &amp; Triceps</div>
              </div>
            </div>
            <div style="font-size:13.5px;font-weight:500;color:var(--ink-dim);margin-top:12px;">6 exercises · 34 min</div>
            <button style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:14px;padding:13px 15px;border-radius:12px;background:rgba(255,255,255,0.05);transition:background .15s ease;" style-active="background:rgba(255,255,255,0.11);">
              <span style="font-size:15px;font-weight:700;color:var(--ink);">View summary</span>
              <svg width="18" height="18" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6" stroke="var(--ink-faint)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
          </div>
        </sc-if>

        <div>
          <div style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-faint);margin:0 2px 10px;">This week</div>
          <div style="display:flex;justify-content:space-between;gap:4px;">

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">
              <span style="font-size:12px;font-weight:600;color:var(--ink-faint);">T</span>
              <div style="width:40px;height:40px;border-radius:999px;background:rgba(48,209,88,0.15);display:flex;align-items:center;justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M5 12.5l4.2 4.2L19 7" stroke="var(--green)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              </div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">
              <span style="font-size:12px;font-weight:600;color:var(--amber);opacity:.7;">F</span>
              <div style="width:40px;height:40px;border-radius:999px;border:1.5px solid rgba(255,159,10,0.35);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--amber);opacity:.75;font-variant-numeric:tabular-nums;">4</div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">
              <span style="font-size:12px;font-weight:600;color:var(--ink-faint);">S</span>
              <div style="width:40px;height:40px;border-radius:999px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;opacity:.55;">
                <svg width="17" height="17" viewBox="0 0 24 24"><path d="M21 12.9A8.5 8.5 0 1111.1 3.2 6.6 6.6 0 0021 12.9Z" fill="var(--ink-faint)"/></svg>
              </div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">
              <span style="font-size:12px;font-weight:600;color:var(--ink-faint);">S</span>
              <div style="width:40px;height:40px;border-radius:999px;background:rgba(48,209,88,0.15);display:flex;align-items:center;justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M5 12.5l4.2 4.2L19 7" stroke="var(--green)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              </div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">
              <span style="font-size:12px;font-weight:600;color:var(--ink-faint);">M</span>
              <div style="width:40px;height:40px;border-radius:999px;background:rgba(48,209,88,0.15);display:flex;align-items:center;justify-content:center;">
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M5 12.5l4.2 4.2L19 7" stroke="var(--green)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              </div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">
              <span style="font-size:12px;font-weight:700;color:var(--blue);">T</span>
              <div style="position:relative;width:40px;height:40px;">
                <div style="position:absolute;top:50%;left:50%;width:40px;height:40px;margin:-20px 0 0 -20px;border-radius:999px;border:1.5px solid var(--blue);animation:{{ pulseAnim }};"></div>
                <div style="position:absolute;inset:0;border-radius:999px;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums;">8</div>
              </div>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">
              <span style="font-size:12px;font-weight:600;color:var(--ink-faint);">W</span>
              <div style="width:40px;height:40px;border-radius:999px;border:1.5px solid var(--hairline);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--ink-dim);font-variant-numeric:tabular-nums;">9</div>
            </div>

          </div>
        </div>

        <div style="background:var(--card);border:1px solid var(--card-border);border-radius:16px;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;">
            <span style="font-size:15px;font-weight:700;color:var(--ink);">Friends</span>
            <button style="font-size:14px;font-weight:600;color:var(--blue);transition:opacity .15s ease;" style-active="opacity:.5;">See all</button>
          </div>

          <button style="display:flex;align-items:center;gap:12px;width:100%;padding:11px 16px;border-top:1px solid var(--hairline);text-align:left;transition:background .15s ease;" style-active="background:rgba(255,255,255,0.04);">
            <div style="flex:none;width:38px;height:38px;border-radius:999px;background:rgba(61,139,253,0.18);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue);">JM</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:16px;font-weight:600;letter-spacing:-0.01em;color:var(--ink);">Jordan M.</div>
              <div style="font-size:13px;font-weight:500;color:var(--ink-dim);margin-top:1px;">completed Day 2 · 🔥 12</div>
            </div>
            <span style="flex:none;font-size:12.5px;font-weight:500;color:var(--ink-faint);">8m</span>
          </button>

          <button style="display:flex;align-items:center;gap:12px;width:100%;padding:11px 16px;border-top:1px solid var(--hairline);text-align:left;transition:background .15s ease;" style-active="background:rgba(255,255,255,0.04);">
            <div style="flex:none;width:38px;height:38px;border-radius:999px;background:rgba(48,209,88,0.18);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--green);">SK</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:16px;font-weight:600;letter-spacing:-0.01em;color:var(--ink);">Sarah K.</div>
              <div style="font-size:13px;font-weight:500;color:var(--ink-dim);margin-top:1px;">completed Day 4 · 🔥 31</div>
            </div>
            <span style="flex:none;font-size:12.5px;font-weight:500;color:var(--ink-faint);">1h</span>
          </button>

          <button style="display:flex;align-items:center;gap:12px;width:100%;padding:11px 16px;border-top:1px solid var(--hairline);text-align:left;transition:background .15s ease;" style-active="background:rgba(255,255,255,0.04);">
            <div style="flex:none;width:38px;height:38px;border-radius:999px;background:rgba(255,159,10,0.18);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--amber);">MR</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:16px;font-weight:600;letter-spacing:-0.01em;color:var(--ink);">Mike R.</div>
              <div style="font-size:13px;font-weight:500;color:var(--ink-dim);margin-top:1px;">completed Day 1 · 🔥 5</div>
            </div>
            <span style="flex:none;font-size:12.5px;font-weight:500;color:var(--ink-faint);">3h</span>
          </button>
        </div>

        <button style="display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px;transition:background .15s ease;" style-active="background:rgba(255,255,255,0.03);">
          <div style="display:flex;align-items:center;gap:13px;">
            <div style="flex:none;width:44px;height:44px;border-radius:12px;background:rgba(255,159,10,0.14);display:flex;align-items:center;justify-content:center;">
              <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 3l6 2.6v5.2c0 3.7-2.6 6.4-6 7.9-3.4-1.5-6-4.2-6-7.9V5.6L12 3Z" fill="var(--amber)" opacity="0.9"/><path d="M12 8.2l1 2.1 2.3.2-1.7 1.5.5 2.2L12 13l-2.1 1.2.5-2.2-1.7-1.5 2.3-.2 1-2.1Z" fill="var(--bg)"/></svg>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:16px;font-weight:600;letter-spacing:-0.01em;color:var(--ink);">10 Workouts</div>
              <div style="font-size:13px;font-weight:500;color:var(--ink-dim);margin-top:1px;">2 workouts to go</div>
            </div>
          </div>
          <div style="height:6px;border-radius:999px;background:var(--hairline);margin-top:14px;overflow:hidden;">
            <div style="width:80%;height:100%;border-radius:999px;background:var(--amber);"></div>
          </div>
        </button>

      </div>
    </div>

    <nav style="position:absolute;left:0;right:0;bottom:0;z-index:30;display:flex;padding:9px 8px calc(env(safe-area-inset-bottom) + 8px);background:linear-gradient(0deg,rgba(10,13,18,0.96) 60%,rgba(10,13,18,0.72));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--hairline);">
      <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s ease;" style-active="transform:scale(0.9);">
        <svg width="25" height="25" viewBox="0 0 24 24"><path d="M13 2L5 13h5l-1 9 9-12h-6l1-8z" fill="var(--blue)"/></svg>
        <span style="font-size:10px;font-weight:600;color:var(--blue);">Today</span>
      </button>
      <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s ease;" style-active="transform:scale(0.9);">
        <svg width="25" height="25" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h11" stroke="var(--ink-faint)" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
        <span style="font-size:10px;font-weight:600;color:var(--ink-faint);">Plan</span>
      </button>
      <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s ease;" style-active="transform:scale(0.9);">
        <svg width="25" height="25" viewBox="0 0 24 24"><path d="M5 20V11M12 20V4M19 20v-6" stroke="var(--ink-faint)" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg>
        <span style="font-size:10px;font-weight:600;color:var(--ink-faint);">Stats</span>
      </button>
      <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s ease;" style-active="transform:scale(0.9);">
        <svg width="25" height="25" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3" stroke="var(--ink-faint)" stroke-width="1.8" fill="none"/><path d="M3.5 19c0-3 2.5-4.8 5.5-4.8s5.5 1.8 5.5 4.8" stroke="var(--ink-faint)" stroke-width="1.8" stroke-linecap="round" fill="none"/><circle cx="17" cy="9" r="2.4" stroke="var(--ink-faint)" stroke-width="1.8" fill="none"/><path d="M16 14.4c2.6-.4 4.7 1.2 4.7 3.9" stroke="var(--ink-faint)" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
        <span style="font-size:10px;font-weight:600;color:var(--ink-faint);">Friends</span>
      </button>
      <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s ease;" style-active="transform:scale(0.9);">
        <svg width="25" height="25" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.4" stroke="var(--ink-faint)" stroke-width="1.9" fill="none"/><path d="M5 20c0-3.8 3.1-5.8 7-5.8s7 2 7 5.8" stroke="var(--ink-faint)" stroke-width="1.9" stroke-linecap="round" fill="none"/></svg>
        <span style="font-size:10px;font-weight:600;color:var(--ink-faint);">Profile</span>
      </button>
    </nav>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:1010},&quot;heroState&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;notStarted&quot;,&quot;inProgress&quot;,&quot;complete&quot;],&quot;default&quot;:&quot;notStarted&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Hero&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}">
class Component extends DCLogic {
  state = { view: null };
  renderVals() {
    const view = this.state.view ?? this.props.heroState ?? 'notStarted';
    const reduce = this.props.reduceMotion ?? false;
    const base = 'flex:1;padding:9px 0;border-radius:999px;font-size:13px;font-weight:700;letter-spacing:-0.01em;transition:transform .15s ease,background .15s ease;';
    const on = base + 'background:var(--blue);color:#fff;';
    const off = base + 'background:rgba(255,255,255,0.06);color:#9AA3AF;';
    return {
      isNot: view === 'notStarted',
      isProg: view === 'inProgress',
      isDone: view === 'complete',
      setNot: () => this.setState({ view: 'notStarted' }),
      setProg: () => this.setState({ view: 'inProgress' }),
      setDone: () => this.setState({ view: 'complete' }),
      st1: view === 'notStarted' ? on : off,
      st2: view === 'inProgress' ? on : off,
      st3: view === 'complete' ? on : off,
      pulseAnim: reduce ? 'none' : 'pulseRing 2.2s ease-out infinite',
      ringAnim: reduce ? 'none' : 'ringDash .6s cubic-bezier(.4,0,.2,1) forwards',
    };
  }
}
</script>
</body>
</html>
